<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Toolkit Weekly Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="auth-overlay" id="authOverlay" aria-hidden="true">
      <div class="auth-card">
        <p class="eyebrow" id="authEyebrow">Local Login</p>
        <h2 id="authTitle">Sign in</h2>
        <p class="subhead" id="authSubtitle">Enter your credentials to continue.</p>
        <form id="authForm">
          <label class="field">
            <span>Username</span>
            <input type="text" id="authUsername" autocomplete="username" required />
          </label>
          <label class="field">
            <span>Password</span>
            <input type="password" id="authPassword" autocomplete="current-password" required />
          </label>
          <button class="button" id="authSubmit" type="submit">Sign in</button>
          <p class="auth-message" id="authMessage" role="status"></p>
        </form>
      </div>
    </div>
    <main class="app">
      <header class="header">
        <div>
          <button class="text-button" id="changePasswordButton" type="button">Change Password</button>
          <p class="eyebrow">AI New Year</p>
          <h1>10-Week AI Resolution Tracker</h1>
          <p class="subhead">Track completion, notes, and time spent each week.</p>
        </div>
        <div class="summary">
          <div class="summary-label">Progress</div>
          <div class="progress-track" aria-label="Overall progress">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-meta">
            <span id="progressText">0% complete</span>
            <span id="hoursText">0 hours logged</span>
          </div>
          <div class="controls">
            <button class="button" id="exportButton" type="button">Export</button>
            <label class="toggle">
              <span>Theme</span>
              <select id="themeSelect">
                <option value="system">System</option>
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </label>
          </div>
        </div>
      </header>

      <section>
        <div class="week-toggle">
          <button class="button" id="prevButton" type="button">&lt;</button>
          <span class="nav-status" id="navStatus">Week 1</span>
          <button class="button" id="nextButton" type="button">&gt;</button>
        </div>
        <div class="grid" id="weeks"></div>
      </section>

      <footer class="footer">
        <span class="footer-note">@ 2026 Kevin M. Korous, Ph.D.</span>
        <div class="footer-actions">
          <button class="button" id="lockButton" type="button">Lock</button>
          <button class="button" id="resetButton" type="button">Reset week data</button>
        </div>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
